{% extends 'base/base_email.html' %}

{% block title %}Nuevo Mensaje{% endblock %}

{% block content %}
    <div style="background-color: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 25px;">
        <p style="margin: 0 0 10px 0;"><strong>Usuario:</strong> {{ user.username }}</p>
        <p style="margin: 0 0 10px 0;"><strong>Email:</strong> <a href="mailto:{{ user.email }}" style="color: #2e7d32;">{{ user.email }}</a></p>
        <p style="margin: 0;"><strong>Asunto:</strong> {{ subject }}</p>
    </div>

    <p style="font-weight: bold; color: #2e7d32; margin-bottom: 10px;">Mensaje:</p>
    <div style="background-color: #ffffff; border-left: 4px solid #2e7d32; padding: 15px 20px; border-radius: 4px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05);">
        {{ message|linebreaks }}
    </div>
    <div style="margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee; text-align: center;">
        <p style="font-size: 12px; color: #999; margin: 0;">
            Este es un mensaje automático enviado desde <strong>{{ domain }}</strong>
        </p>
    </div>
{% endblock %}
