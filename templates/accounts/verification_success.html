{% extends 'base/base.html' %}

{% block body %}
    <div class="container mt-5 text-center">
        <div class="card shadow p-5" style="max-width: 500px; margin: 0 auto; border-radius: 15px;">
            <div class="mb-4">
                <i class="bi bi-patch-check-fill text-success" style="font-size: 5rem;"></i>
            </div>
            <h2 class="fw-bold">¡Cuenta Activada!</h2>
            <p class="text-muted">Hola <strong>{{ verified_user.username }}</strong>, tu cuenta ha sido verificada con éxito.</p>

            <hr class="my-4">

            <div class="d-flex align-items-center justify-content-center mb-3">
                <div class="spinner-grow spinner-grow-sm text-primary me-2" role="status"></div>
                <span>Esta ventana se cerrará en <span id="timer">3</span> segundos...</span>
            </div>

            <p class="text-muted small">Si la ventana no se cierra automáticamente, puedes cerrarla manualmente.</p>
        </div>
    </div>

    <script>
        let timeLeft = 3;
        const timerElem = document.getElementById('timer');

        // Intervalo para el contador visual
        const countdown = setInterval(() => {
            timeLeft--;
            if (timerElem) timerElem.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
            }
        }, 1000);

        // Intento de cierre total tras 3 segundos
        setTimeout(() => {
            // Intentar cerrar la pestaña actual
            window.close();

            // Refuerzo para navegadores que bloquean scripts de cierre:
            // Si después de un momento sigue abierta, intentamos enviar un comando de cierre
            setTimeout(() => {
                if (!window.closed) {
                    // Algunos navegadores requieren este truco para permitir el cierre
                    window.open('', '_self', '');
                    window.close();
                }
            }, 100);
        }, 3000);
    </script>
{% endblock %}
