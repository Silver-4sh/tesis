{% extends "base/base.html" %}
{% load static %}

{% block body %}
    <div class="bg-spots">
        <div class="spot spot-green"></div>
        <div class="spot spot-blue"></div>
        <div class="spot spot-red"></div>
    </div>

    <div class="container vh-100 d-flex flex-column justify-content-center" style="position: relative; z-index: 1;">
        <div class="row justify-content-center">
            <div class="col-11 col-md-6 col-lg-4">
                <div class="card glass-card border-0 shadow-lg text-center">

                    <div class="card-body p-5">
                        <div class="mb-4">
                            <i class="bi bi-check-circle-fill text-green" style="font-size: 4rem;"></i>
                        </div>

                        <h3 class="fw-bold mb-3">¡Contraseña Cambiada!</h3>

                        <p class="opacity-75 mb-4">
                            Tu contraseña ha sido actualizada con éxito. Ya puedes volver a utilizar tu cuenta de EcoCircular.
                        </p>

                        <div class="d-grid gap-2">
                            <a href="{% url 'login' %}" class="btn btn-green fw-bold shadow-sm py-2">
                                Iniciar Sesión ahora
                            </a>
                        </div>
                    </div>

                    <div class="card-footer bg-transparent border-top border-light border-opacity-10 py-3">
                        <small class="opacity-50">Protegiendo tu identidad en la economía circular.</small>
                    </div>

                </div>
            </div>
        </div>
    </div>
{% endblock body %}
