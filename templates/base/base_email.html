{% autoescape off %}
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
    </head>
    <body style="font-family: sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f4f4;">
    <div style="max-width: 600px; margin: 20px auto; border: 1px solid #eee; padding: 30px; border-radius: 10px; background-color: #ffffff;">

        <!-- Header / Logo Area -->
        <div style="border-bottom: 2px solid #2e7d32; padding-bottom: 15px; margin-bottom: 20px;">
            <h2 style="color: #2e7d32; margin: 0;">{% block title %}{% endblock %}</h2>
            <p style="font-size: 14px; color: #666; margin: 5px 0 0 0;">Plataforma EcoCircular</p>
        </div>

        <!-- Main Content -->
        {% block content %}
        {% endblock %}

        <!-- Footer -->
        <div style="margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee; text-align: center;">
            <p style="font-size: 12px; color: #999; margin: 0;">
                Este es un mensaje automático enviado desde <strong>{{ domain }}</strong>
                {% if site_name %}<br>El equipo de {{ site_name }}{% endif %}
            </p>
        </div>
    </div>
    </body>
    </html>
{% endautoescape %}
